name: Sync Products from Google Sheets
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Fetch Data
        run: curl -L "https://script.google.com/macros/s/AKfycbxFpHtzmPjJ7zibs988oGaqPA8FDemLByFBYoog7LK9kjplqURgv23k6Rpg3iEGtmdVCA/exec" -o products.json
      - name: Commit and Push
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@github.com"
          git add products.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update" && git push)
          
