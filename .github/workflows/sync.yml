name: Sync Products from Google Sheets
on:
  schedule:
    - cron: '0 * * * *' # This tells it to run every hour automatically
  workflow_dispatch:   # This adds a button so you can run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Fetch Data from Apps Script
        run: |
          # Replace the URL below with your actual Google Apps Script Web App URL
          curl -L "https://script.google.com/macros/s/AKfycbyRsV37oedTFMWhQjlbsgQXh9g4o1ZgRCVkfeNq7wSSTUh7lPROAX8ebMdXAa1ZYhKj/exec" -o products.json

      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add products.json
          # Only commit if the data has actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update products from Sheet" && git push)
