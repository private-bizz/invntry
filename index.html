<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store | Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom smooth transition for the modal */
        #orderModal { transition: opacity 0.3s ease; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white border-b sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-black uppercase">The Boutique</h1>
            <nav class="hidden md:block">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">In-Stock Live Feed</span>
            </nav>
        </div>
    </header>

    <section class="bg-black text-white py-16 px-6 text-center">
        <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Curated Excellence</h2>
        <p class="text-gray-400 max-w-xl mx-auto">Discover our latest arrivals, synced directly from our master inventory. Quality guaranteed.</p>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 text-gray-400">Loading master collection...</div>
        </div>
    </main>

    <div id="orderModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4 opacity-0">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl transform transition-all scale-95">
            <h3 class="text-2xl font-bold mb-2">Secure Your Order</h3>
            <p class="text-gray-500 mb-6">Enter your name so we can prepare your product details for WhatsApp.</p>
            
            <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Your Full Name</label>
            <input type="text" id="userName" placeholder="e.g. John Doe" 
                class="w-full border-2 border-gray-100 bg-gray-50 p-4 rounded-xl mb-6 outline-none focus:border-black transition-colors">
            
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-4 rounded-xl font-bold text-gray-400 hover:bg-gray-100 transition">Cancel</button>
                <button onclick="finalizeOrder()" class="flex-2 bg-black text-white px-8 py-4 rounded-xl font-bold hover:bg-gray-800 transition shadow-lg">Proceed to WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcRzCj4QwD5UQKnjhGAsXxp5L_DumU0PP5fmUlvkLl0qwxt0CUEOXNeEDEGFev8zE9AA/exec"; 
        const WHATSAPP_NUMBER = "2349057835662"; // Replace with client's phone (include country code, no +)

        let selectedProduct = null;

        // 1. Fetch & Render Products
        async function loadProducts() {
            try {
                // Fetch the static JSON file generated by GitHub Actions
                const res = await fetch('./products.json');
                const products = await res.json();
                const grid = document.getElementById('product-grid');

                if (products.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20">No products found in inventory.</div>`;
                    return;
                }

                grid.innerHTML = products.map(p => {
                    // Status Badge Logic
                    const isInStock = p.Status === "In Stock";
                    const badgeClass = isInStock ? "bg-green-100 text-green-700" : "bg-red-100 text-red-600";
                    const buttonClass = isInStock ? "bg-black hover:bg-gray-800 text-white" : "bg-gray-200 text-gray-400 cursor-not-allowed";

                    return `
                    <div class="product-card group bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300">
                        <div class="relative overflow-hidden">
                            <img src="${p.Image_URL}" alt="${p.Name}" class="w-full h-80 object-cover transition-transform duration-500" loading="lazy">
                            <span class="absolute top-4 left-4 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${badgeClass} shadow-sm">
                                ${p.Status}
                            </span>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold tracking-tight">${p.Name}</h3>
                                <span class="text-xl font-black text-black">$${p.Price}</span>
                            </div>
                            <p class="text-gray-500 text-sm leading-relaxed mb-6 line-clamp-2">${p.Description}</p>
                            <button 
                                onclick="${isInStock ? `openModal('${p.Name}', '${p.Price}')` : ''}" 
                                class="w-full py-4 rounded-xl font-bold uppercase tracking-widest text-xs transition-all ${buttonClass}"
                                ${isInStock ? '' : 'disabled'}>
                                ${isInStock ? 'Order Now' : 'Sold Out'}
                            </button>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Error loading products:", error);
                document.getElementById('product-grid').innerHTML = `<div class="col-span-full text-center text-red-500">Failed to load inventory. Please check back later.</div>`;
            }
        }

        // 2. Modal Controls
        function openModal(name, price) {
            selectedProduct = { name, price };
            const modal = document.getElementById('orderModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.querySelector('div').classList.remove('scale-95');
                modal.querySelector('div').classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('orderModal');
            modal.classList.remove('opacity-100');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // 3. Finalize & Lead Capture
        async function finalizeOrder() {
            const nameInput = document.getElementById('userName');
            const name = nameInput.value.trim();

            if (!name) {
                nameInput.classList.add('border-red-500');
                return;
            }

            // A. Send Lead to Google Sheet (Async)
            // We use 'no-cors' mode as Apps Script doesn't return standard CORS headers
            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userName: name,
                    productName: selectedProduct.name,
                    price: selectedProduct.price
                })
            });

            // B. Redirect to WhatsApp
            const message = `Hello! My name is ${name}. I am interested in purchasing the ${selectedProduct.name} ($${selectedProduct.price}). Please let me know the next steps!`;
            window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
        }

        // Initial Load
        loadProducts();
    </script>
</body>
</html>
