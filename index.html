<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="bg-white border-b py-8 px-6 text-center">
        <h1 class="text-3xl font-black uppercase tracking-tighter italic">The Master Feed</h1>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full text-center py-20 text-gray-400">Updating inventory...</div>
        </div>
    </main>

    <div id="orderModal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-10 max-w-md w-full shadow-2xl">
            <h3 class="text-2xl font-bold mb-2">Secure Your Order</h3>
            <p class="text-gray-500 mb-6 text-sm">Please enter your name to continue to WhatsApp.</p>
            <input type="text" id="userName" placeholder="Full Name" class="w-full border-2 bg-gray-50 p-4 rounded-xl mb-6 outline-none focus:border-black transition-all">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 font-bold text-gray-400">Cancel</button>
                <button onclick="finalizeOrder()" class="flex-2 bg-black text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-black/20">Send Order</button>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "PASTE_YOUR_WEB_APP_URL_HERE"; 
        const WHATSAPP_NUMBER = "2348000000000"; // Replace with your client's number
        let selectedProduct = null;

        async function loadProducts() {
            try {
                const res = await fetch('./products.json');
                const products = await res.json();
                const grid = document.getElementById('product-grid');

                grid.innerHTML = products.map(p => {
                    const stock = parseInt(p.Stock) || 0;
                    let btnText, btnClass, isClickable = true;

                    // STOCK LOGIC
                    if (stock === 0) {
                        btnText = "SOLD OUT";
                        btnClass = "bg-gray-200 text-gray-400 cursor-not-allowed";
                        isClickable = false;
                    } else if (stock >= 1 && stock <= 5) {
                        btnText = `${stock} ${stock === 1 ? 'UNIT' : 'UNITS'} REMAINING`;
                        btnClass = "bg-orange-500 text-white shadow-orange-200";
                    } else {
                        btnText = "ORDER NOW";
                        btnClass = "bg-black text-white shadow-gray-200";
                    }

                    // IMAGE LINK FIX
                    let imgUrl = p.Image_URL;
                    const driveIdMatch = imgUrl.match(/[-\w]{25,}/);
                    if (driveIdMatch) {
                        imgUrl = `https://lh3.googleusercontent.com/d/${driveIdMatch[0]}`;
                    }

                    return `
                    <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm transition-all group">
                        <div class="h-80 overflow-hidden bg-gray-100">
                            <img src="${imgUrl}" alt="${p.Name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/600x400?text=Check+Drive+Permissions'">
                        </div>
                        <div class="p-8">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-xl font-bold italic uppercase">${p.Name}</h3>
                                <span class="text-xl font-black">₦${p.Price}</span>
                            </div>
                            <p class="text-gray-400 text-xs mb-6 leading-relaxed uppercase tracking-widest">${p.Description}</p>
                            <button ${isClickable ? `onclick="openModal('${p.Name}', '${p.Price}')"` : 'disabled'} class="w-full py-4 rounded-xl font-black uppercase tracking-tighter text-sm shadow-xl transition-all ${btnClass}">
                                ${btnText}
                            </button>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) { console.error(e); }
        }

        function openModal(n, p) { selectedProduct = {n, p}; document.getElementById('orderModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function finalizeOrder() {
            const name = document.getElementById('userName').value.trim();
            if (!name) return;
            fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ userName: name, productName: selectedProduct.n, price: selectedProduct.p })});
            const msg = `Hi! I'm ${name}. I'd like to order ${selectedProduct.n} (₦${selectedProduct.p}).`;
            window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
        }
        loadProducts();
    </script>
</body>
</html>
